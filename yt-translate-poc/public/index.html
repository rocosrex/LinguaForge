<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Realtime Translation</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #263241;
      --text: #f9fafb;
      --muted: #a7b0bf;
      --line: #374151;
      --accent: #14b8a6;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .toolbar,
    .audio-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .audio-controls {
      margin-top: 12px;
    }

    button,
    select {
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--line);
      font: inherit;
    }

    button {
      padding: 0 14px;
      border-color: transparent;
      background: var(--accent);
      color: #05201d;
      font-weight: 700;
      cursor: pointer;
    }

    button.stop {
      background: var(--danger);
      color: white;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    select {
      padding: 0 10px;
      background: var(--panel-2);
      color: var(--text);
    }

    .status,
    .elapsed {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 14px;
    }

    label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    input[type="range"] {
      width: 160px;
      accent-color: var(--accent);
    }

    .subtitles {
      margin-top: 16px;
      min-height: 320px;
      max-height: 58vh;
      overflow-y: auto;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f172a;
      font-size: 28px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    audio {
      width: 100%;
      margin-top: 12px;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 960px);
        padding-top: 16px;
      }

      .toolbar,
      .audio-controls {
        align-items: stretch;
      }

      button,
      select,
      .status,
      .elapsed,
      label {
        width: 100%;
      }

      input[type="range"] {
        flex: 1;
        width: auto;
      }

      .subtitles {
        min-height: 280px;
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>YouTube Realtime Translation</h1>

    <section class="toolbar" aria-label="세션 컨트롤">
      <button id="startBtn" type="button">시작</button>
      <button id="stopBtn" class="stop" type="button" disabled>종료</button>
      <button id="downloadBtn" class="secondary" type="button" disabled>Markdown 다운로드</button>
      <select id="lang" aria-label="대상 언어">
        <option value="ko" selected>한국어</option>
        <option value="ja">일본어</option>
        <option value="zh">중국어</option>
        <option value="es">스페인어</option>
      </select>
      <span id="status" class="status" role="status" aria-live="polite">대기 중</span>
      <span id="elapsed" class="elapsed">00:00</span>
    </section>

    <section class="audio-controls" aria-label="오디오 믹스">
      <label for="originalVolume">
        원본
        <input id="originalVolume" type="range" min="0" max="1" step="0.01" value="0.08">
      </label>
      <label for="translatedVolume">
        번역
        <input id="translatedVolume" type="range" min="0" max="1" step="0.01" value="1">
      </label>
    </section>

    <audio id="originalAudio" autoplay></audio>
    <audio id="translatedAudio" autoplay controls></audio>

    <section id="subtitles" class="subtitles" aria-live="polite">
      한국어 자막이 여기에 표시됩니다.
    </section>
  </main>

  <script>
    document.getElementById("status").textContent =
      "시작 버튼을 누른 뒤 YouTube 탭과 탭 오디오 공유를 선택하세요.";
  </script>
</body>
</html>
