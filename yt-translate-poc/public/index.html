<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Realtime Translation</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #263241;
      --text: #f9fafb;
      --muted: #a7b0bf;
      --line: #374151;
      --accent: #14b8a6;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .toolbar,
    .audio-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .audio-controls {
      margin-top: 12px;
    }

    button,
    select {
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--line);
      font: inherit;
    }

    button {
      padding: 0 14px;
      border-color: transparent;
      background: var(--accent);
      color: #05201d;
      font-weight: 700;
      cursor: pointer;
    }

    button.stop {
      background: var(--danger);
      color: white;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    select {
      padding: 0 10px;
      background: var(--panel-2);
      color: var(--text);
    }

    .status,
    .elapsed {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 14px;
    }

    .status.active {
      color: #ccfbf1;
      background: #115e59;
    }

    .status.error {
      color: white;
      background: #991b1b;
    }

    label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    input[type="range"] {
      width: 160px;
      accent-color: var(--accent);
    }

    .subtitles {
      margin-top: 16px;
      min-height: 320px;
      max-height: 58vh;
      overflow-y: auto;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f172a;
      font-size: 28px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    audio {
      width: 100%;
      margin-top: 12px;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 960px);
        padding-top: 16px;
      }

      .toolbar,
      .audio-controls {
        align-items: stretch;
      }

      button,
      select,
      .status,
      .elapsed,
      label {
        width: 100%;
      }

      input[type="range"] {
        flex: 1;
        width: auto;
      }

      .subtitles {
        min-height: 280px;
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>YouTube Realtime Translation</h1>

    <section class="toolbar" aria-label="세션 컨트롤">
      <button id="startBtn" type="button">시작</button>
      <button id="stopBtn" class="stop" type="button" disabled>종료</button>
      <button id="downloadBtn" class="secondary" type="button" disabled>Markdown 다운로드</button>
      <select id="lang" aria-label="대상 언어">
        <option value="ko" selected>한국어</option>
        <option value="ja">일본어</option>
        <option value="zh">중국어</option>
        <option value="es">스페인어</option>
      </select>
      <span id="status" class="status" role="status" aria-live="polite">대기 중</span>
      <span id="elapsed" class="elapsed">00:00</span>
    </section>

    <section class="audio-controls" aria-label="오디오 믹스">
      <label for="originalVolume">
        원본
        <input id="originalVolume" type="range" min="0" max="1" step="0.01" value="0.08">
      </label>
      <label for="translatedVolume">
        번역
        <input id="translatedVolume" type="range" min="0" max="1" step="0.01" value="1">
      </label>
    </section>

    <audio id="originalAudio" autoplay></audio>
    <audio id="translatedAudio" autoplay controls></audio>

    <section id="subtitles" class="subtitles" aria-live="polite">
      한국어 자막이 여기에 표시됩니다.
    </section>
  </main>

  <script>
    const OPENAI_TRANSLATION_CALL_URL =
      "https://api.openai.com/v1/realtime/translations/calls";
    const TEST_MODE = new URLSearchParams(window.location.search).get("testMode") === "1";
    const MAX_SESSION_MS = TEST_MODE ? 15000 : 120 * 60 * 1000;
    const SILENCE_TIMEOUT_MS = TEST_MODE ? 5000 : 30 * 60 * 1000;
    const SILENCE_CHECK_INTERVAL_MS = 1000;
    const SILENCE_RMS_THRESHOLD = 0.012;

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const langSelect = document.getElementById("lang");
    const statusEl = document.getElementById("status");
    const elapsedEl = document.getElementById("elapsed");
    const originalVolume = document.getElementById("originalVolume");
    const translatedVolume = document.getElementById("translatedVolume");
    const subtitles = document.getElementById("subtitles");
    const originalAudio = document.getElementById("originalAudio");
    const translatedAudio = document.getElementById("translatedAudio");

    const session = {
      pc: null,
      events: null,
      sourceStream: null,
      audioContext: null,
      analyser: null,
      analyserBuffer: null,
      timers: {
        elapsed: null,
        maxSession: null,
        silence: null,
      },
      lastSoundAt: null,
      start: null,
      end: null,
      endReason: null,
      transcript: "",
      state: "idle",
      generation: 0,
      abortController: null,
    };

    function setStatus(message, { active = false, error = false } = {}) {
      statusEl.textContent = message;
      statusEl.classList.toggle("active", active);
      statusEl.classList.toggle("error", error);
    }

    function setState(nextState, message) {
      const activeStates = ["requesting-capture", "creating-session", "connecting", "translating"];

      session.state = nextState;
      startBtn.disabled = !["idle", "ended", "error"].includes(nextState);
      stopBtn.disabled = !activeStates.includes(nextState);
      langSelect.disabled = !["idle", "ended", "error"].includes(nextState);
      downloadBtn.disabled = session.transcript.trim().length === 0;

      setStatus(message, {
        active: nextState === "translating",
        error: nextState === "error",
      });
    }

    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function updateElapsed() {
      if (!session.start) {
        elapsedEl.textContent = "00:00";
        return;
      }

      const end = session.end ?? new Date();
      elapsedEl.textContent = formatDuration(end.getTime() - session.start.getTime());
    }

    function setAudioVolumes() {
      originalAudio.volume = Number(originalVolume.value);
      translatedAudio.volume = Number(translatedVolume.value);
    }

    function appendCaption(delta) {
      if (!delta) {
        return;
      }

      session.transcript += delta;
      subtitles.textContent = session.transcript;
      subtitles.scrollTop = subtitles.scrollHeight;
      downloadBtn.disabled = session.transcript.trim().length === 0;
    }

    function isCurrentGeneration(currentGeneration) {
      return session.generation === currentGeneration;
    }

    function handleSessionError(message) {
      if (["idle", "ended", "error"].includes(session.state)) {
        return;
      }

      session.end = new Date();
      session.endReason = "error";
      cleanupResources();
      updateElapsed();
      setState("error", `오류: ${message}`);
    }

    function cleanupStaleStart(currentGeneration, stream) {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }

      if (isCurrentGeneration(currentGeneration)) {
        cleanupResources();
      }
    }

    function extractTranscriptDelta(event) {
      if (typeof event?.delta !== "string") {
        return "";
      }

      const type = event.type ?? "";
      const isOutputTranscriptDelta =
        type.includes("output_transcript") ||
        (type.includes("output") && type.includes("transcript") && type.includes("delta"));

      return isOutputTranscriptDelta ? event.delta : "";
    }

    function handleRealtimeEvent(rawData) {
      try {
        const event = JSON.parse(rawData);

        if (event.type?.includes("error")) {
          console.error("Realtime Translation event error", event);
          handleSessionError(event.error?.message ?? "Realtime Translation 오류가 발생했습니다.");
          return;
        }

        appendCaption(extractTranscriptDelta(event));
      } catch (error) {
        console.error("Failed to parse realtime event", error, rawData);
      }
    }

    async function captureTabAudio() {
      const preferredOptions = {
        video: true,
        audio: {
          suppressLocalAudioPlayback: true,
        },
        preferCurrentTab: false,
      };

      try {
        return await navigator.mediaDevices.getDisplayMedia(preferredOptions);
      } catch (error) {
        if (error instanceof TypeError) {
          return navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: true,
            preferCurrentTab: false,
          });
        }

        throw error;
      }
    }

    async function createClientSecret(targetLanguage, signal) {
      const response = await fetch("/session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ targetLanguage }),
        signal,
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error ?? "세션 생성에 실패했습니다.");
      }

      const clientSecret = data.value ?? data.client_secret?.value;
      if (!clientSecret) {
        throw new Error("OpenAI client secret 응답이 비어 있습니다.");
      }

      return clientSecret;
    }

    async function connectWebRtc(audioTrack, stream, clientSecret, signal) {
      const pc = new RTCPeerConnection();
      session.pc = pc;

      pc.addTrack(audioTrack, stream);
      session.events = pc.createDataChannel("oai-events");
      session.events.onmessage = ({ data }) => handleRealtimeEvent(data);

      pc.onconnectionstatechange = () => {
        if (
          ["failed", "disconnected", "closed"].includes(pc.connectionState) &&
          ["connecting", "translating"].includes(session.state)
        ) {
          handleSessionError(`WebRTC 연결이 ${pc.connectionState} 상태가 되었습니다.`);
        }
      };

      pc.oniceconnectionstatechange = () => {
        if (
          ["failed", "disconnected", "closed"].includes(pc.iceConnectionState) &&
          ["connecting", "translating"].includes(session.state)
        ) {
          handleSessionError(`WebRTC ICE 연결이 ${pc.iceConnectionState} 상태가 되었습니다.`);
        }
      };

      pc.ontrack = ({ streams }) => {
        translatedAudio.srcObject = streams[0];
        translatedAudio.play().catch(() => {});
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const response = await fetch(OPENAI_TRANSLATION_CALL_URL, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${clientSecret}`,
          "Content-Type": "application/sdp",
        },
        body: offer.sdp,
        signal,
      });

      if (!response.ok) {
        throw new Error(await response.text());
      }

      await pc.setRemoteDescription({
        type: "answer",
        sdp: await response.text(),
      });
    }

    function startElapsedTimer() {
      clearInterval(session.timers.elapsed);
      session.timers.elapsed = setInterval(updateElapsed, 1000);
      updateElapsed();
    }

    function startMaxSessionTimer() {
      clearTimeout(session.timers.maxSession);
      session.timers.maxSession = setTimeout(() => {
        stopSession("max-session-time");
      }, MAX_SESSION_MS);
    }

    function startSilenceMonitor(audioTrack) {
      const audioStream = new MediaStream([audioTrack]);
      const AudioContextClass = window.AudioContext ?? window.webkitAudioContext;

      if (!AudioContextClass) {
        console.warn("AudioContext is unavailable; silence timeout is disabled.");
        return;
      }

      session.audioContext = new AudioContextClass();
      const source = session.audioContext.createMediaStreamSource(audioStream);
      session.analyser = session.audioContext.createAnalyser();
      session.analyser.fftSize = 2048;
      source.connect(session.analyser);
      session.analyserBuffer = new Uint8Array(session.analyser.fftSize);
      session.lastSoundAt = Date.now();

      if (session.audioContext.state === "suspended") {
        session.audioContext.resume().catch((error) => {
          console.warn("AudioContext resume failed; silence timeout will wait.", error);
        });
      }

      clearInterval(session.timers.silence);
      session.timers.silence = setInterval(() => {
        if (session.audioContext?.state === "suspended") {
          session.lastSoundAt = Date.now();
          return;
        }

        session.analyser.getByteTimeDomainData(session.analyserBuffer);

        let sum = 0;
        for (const value of session.analyserBuffer) {
          const normalized = (value - 128) / 128;
          sum += normalized * normalized;
        }

        const rms = Math.sqrt(sum / session.analyserBuffer.length);
        if (rms > SILENCE_RMS_THRESHOLD) {
          session.lastSoundAt = Date.now();
          return;
        }

        if (Date.now() - session.lastSoundAt >= SILENCE_TIMEOUT_MS) {
          stopSession("silence-timeout");
        }
      }, SILENCE_CHECK_INTERVAL_MS);
    }

    function cleanupResources() {
      clearInterval(session.timers.elapsed);
      clearInterval(session.timers.silence);
      clearTimeout(session.timers.maxSession);
      session.timers.elapsed = null;
      session.timers.silence = null;
      session.timers.maxSession = null;

      if (session.abortController) {
        session.abortController.abort();
        session.abortController = null;
      }

      if (session.events) {
        session.events.close();
        session.events = null;
      }

      if (session.pc) {
        session.pc.onconnectionstatechange = null;
        session.pc.oniceconnectionstatechange = null;
        session.pc.close();
        session.pc = null;
      }

      if (session.sourceStream) {
        session.sourceStream.getTracks().forEach((track) => track.stop());
        session.sourceStream = null;
      }

      if (session.audioContext) {
        session.audioContext.close().catch(() => {});
        session.audioContext = null;
      }

      session.analyser = null;
      session.analyserBuffer = null;
      originalAudio.srcObject = null;
      translatedAudio.srcObject = null;
    }

    function reasonLabel(reason) {
      const labels = {
        manual: "수동 종료",
        "silence-timeout": "30분 무음 종료",
        "max-session-time": "120분 최대 세션 종료",
        "tab-ended": "탭 공유 종료",
        error: "오류 종료",
      };

      return labels[reason] ?? reason;
    }

    function stopSession(reason = "manual") {
      if (["idle", "ended"].includes(session.state)) {
        return;
      }

      session.generation += 1;
      session.end = new Date();
      session.endReason = reason;
      cleanupResources();
      updateElapsed();
      setState("ended", reasonLabel(reason));
    }

    async function startSession() {
      const currentGeneration = session.generation + 1;
      session.generation = currentGeneration;
      session.abortController = new AbortController();

      setAudioVolumes();
      session.transcript = "";
      session.start = null;
      session.end = null;
      session.endReason = null;
      subtitles.textContent = "";
      downloadBtn.disabled = true;

      try {
        setState("requesting-capture", "탭 오디오 요청 중");
        const captureStream = await captureTabAudio();

        if (!isCurrentGeneration(currentGeneration)) {
          captureStream.getTracks().forEach((track) => track.stop());
          return;
        }

        const audioTrack = captureStream.getAudioTracks()[0];

        if (!audioTrack) {
          captureStream.getTracks().forEach((track) => track.stop());
          throw new Error("Chrome 공유 창에서 탭 오디오 공유를 체크해야 합니다.");
        }

        captureStream.getVideoTracks().forEach((track) => track.stop());
        const audioOnlyStream = new MediaStream([audioTrack]);
        session.sourceStream = audioOnlyStream;
        originalAudio.srcObject = audioOnlyStream;
        originalAudio.play().catch(() => {});
        audioTrack.onended = () => stopSession("tab-ended");

        setState("creating-session", "OpenAI 세션 생성 중");
        const clientSecret = await createClientSecret(
          langSelect.value,
          session.abortController.signal
        );

        if (!isCurrentGeneration(currentGeneration)) {
          cleanupStaleStart(currentGeneration, audioOnlyStream);
          return;
        }

        setState("connecting", "WebRTC 연결 중");
        await connectWebRtc(
          audioTrack,
          audioOnlyStream,
          clientSecret,
          session.abortController.signal
        );

        if (!isCurrentGeneration(currentGeneration)) {
          cleanupStaleStart(currentGeneration, audioOnlyStream);
          return;
        }

        session.start = new Date();
        startElapsedTimer();
        startMaxSessionTimer();
        startSilenceMonitor(audioTrack);
        setState("translating", "통역 중");
      } catch (error) {
        if (error.name === "AbortError" || !isCurrentGeneration(currentGeneration)) {
          cleanupStaleStart(currentGeneration);
          return;
        }

        console.error(error);
        session.end = new Date();
        session.endReason = "error";
        cleanupResources();
        updateElapsed();
        setState("error", `오류: ${error.message}`);
      }
    }

    function formatLocalTimestamp(date) {
      const offsetMs = date.getTimezoneOffset() * 60 * 1000;
      return new Date(date.getTime() - offsetMs).toISOString().slice(0, 19);
    }

    function formatDownloadTimestamp(date) {
      const year = String(date.getFullYear());
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");

      return `${year}${month}${day}-${hours}${minutes}`;
    }

    function buildMarkdown() {
      const started = session.start ?? new Date();
      const ended = session.end ?? new Date();
      const duration = formatDuration(ended.getTime() - started.getTime());
      const reason = session.endReason ?? "manual";
      const transcript = session.transcript.trim() || "자막 내용이 없습니다.";

      return [
        "# YouTube Translation Session",
        "",
        `- Started: ${formatLocalTimestamp(started)}`,
        `- Ended: ${formatLocalTimestamp(ended)}`,
        `- Duration: ${duration}`,
        `- Target language: ${langSelect.value}`,
        `- End reason: ${reason}`,
        "",
        "## Translation Transcript",
        "",
        transcript,
        "",
      ].join("\n");
    }

    function downloadMarkdown() {
      const markdown = buildMarkdown();
      const timestamp = formatDownloadTimestamp(session.start ?? new Date());
      const blob = new Blob([markdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `youtube-translation-${timestamp}.md`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    startBtn.addEventListener("click", startSession);
    stopBtn.addEventListener("click", () => stopSession("manual"));
    downloadBtn.addEventListener("click", downloadMarkdown);
    originalVolume.addEventListener("input", setAudioVolumes);
    translatedVolume.addEventListener("input", setAudioVolumes);

    setAudioVolumes();
    setState(
      "idle",
      "시작 버튼을 누른 뒤 YouTube 탭과 탭 오디오 공유를 선택하세요."
    );
  </script>
</body>
</html>
